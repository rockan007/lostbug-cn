<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="face" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#e2eafc"/>
    </radialGradient>
  </defs>

  <!-- Compass face -->
  <circle cx="50" cy="50" r="38" fill="url(#face)" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#bfdbfe" stroke-width="0.5"/>

  <!-- Needles -->
  <polygon points="50,18 47,50 50,50 53,50" fill="#ef4444"/>
  <polygon points="50,82 47,50 50,50 53,50" fill="#d1d5db"/>
  <polygon points="82,50 50,47 50,50 50,53" fill="#d1d5db"/>
  <polygon points="18,50 50,47 50,50 50,53" fill="#d1d5db"/>

  <!-- Center pin -->
  <circle cx="50" cy="50" r="3" fill="#3b82f6"/>

  <!-- N label -->
  <text x="50" y="22" text-anchor="middle" font-size="6" font-weight="800" fill="#ef4444" font-family="sans-serif">N</text>

  <!-- ===== CENTIPEDE wrapping ~3/4 around compass ===== -->
  <!-- 15 segments, each at r=42, angles from 25° to 290° -->
  <!-- cos(θ)*r+50, sin(θ)*r+50 gives position on circle -->

  <g fill="#4ade80" stroke="#16a34a" stroke-width="0.8">
    <!-- Segments. Positions: (r*cos(θ)+50, r*sin(θ)+50) with r=42 -->
    <!-- θ in degrees: 25,42,59,76,93,110,127,144,161,178,195,212,229,246,263,280 -->
    <!-- Converted: cos(θ)*42+50, sin(θ)*42+50 -->

    <!-- seg 1: θ=25° → (88, 68) -->
    <circle cx="88" cy="68" r="3"/>
    <!-- seg 2: θ=42° → (81, 78) -->
    <circle cx="81" cy="78" r="3"/>
    <!-- seg 3: θ=59° → (72, 86) -->
    <circle cx="72" cy="86" r="3"/>
    <!-- seg 4: θ=76° → (60, 91) -->
    <circle cx="60" cy="91" r="3"/>
    <!-- seg 5: θ=93° → (48, 92) -->
    <circle cx="48" cy="92" r="3"/>
    <!-- seg 6: θ=110° → (36, 89) -->
    <circle cx="36" cy="89" r="3"/>
    <!-- seg 7: θ=127° → (25, 83) -->
    <circle cx="25" cy="83" r="3"/>
    <!-- seg 8: θ=144° → (16, 74) -->
    <circle cx="16" cy="74" r="3"/>
    <!-- seg 9: θ=161° → (10, 64) -->
    <circle cx="10" cy="64" r="3"/>
    <!-- seg 10: θ=178° → (8, 52) -->
    <circle cx="8" cy="52" r="3"/>
    <!-- seg 11: θ=195° → (10, 39) -->
    <circle cx="10" cy="39" r="3"/>
    <!-- seg 12: θ=212° → (16, 28) -->
    <circle cx="16" cy="28" r="3"/>
    <!-- seg 13: θ=229° → (25, 19) -->
    <circle cx="25" cy="19" r="3"/>
    <!-- seg 14: θ=246° → (36, 13) -->
    <circle cx="36" cy="13" r="3"/>
    <!-- seg 15: θ=263° → (48, 11) -->
    <circle cx="48" cy="11" r="3"/>
    <!-- seg 16: θ=280° → (60, 14) -->
    <circle cx="60" cy="14" r="3"/>
  </g>

  <!-- Connecting body line (thin curve through the segments) -->
  <path d="M 88 68 Q 85 74  81 78 Q 76 83  72 86 Q 66 90  60 91 Q 54 92  48 92 Q 42 91  36 89 Q 30 86  25 83 Q 20 79  16 74 Q 13 69  10 64 Q 8 58   8 52 Q 8 46   10 39 Q 13 33  16 28 Q 20 23  25 19 Q 30 15  36 13 Q 42 11  48 11 Q 54 12  60 14"
        fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Legs (outer side) -->
  <g stroke="#16a34a" stroke-width="0.8" stroke-linecap="round">
    <line x1="88" y1="68" x2="94" y2="63"/>
    <line x1="81" y1="78" x2="88" y2="80"/>
    <line x1="72" y1="86" x2="76" y2="93"/>
    <line x1="60" y1="91" x2="60" y2="98"/>
    <line x1="48" y1="92" x2="48" y2="99"/>
    <line x1="36" y1="89" x2="34" y2="96"/>
    <line x1="25" y1="83" x2="20" y2="88"/>
    <line x1="16" y1="74" x2="10" y2="77"/>
    <line x1="10" y1="64" x2="3"  y2="64"/>
    <line x1="8"  y1="52" x2="2"  y2="50"/>
    <line x1="10" y1="39" x2="4"  y2="36"/>
    <line x1="16" y1="28" x2="10" y2="25"/>
  </g>

  <!-- Legs (inner side) -->
  <g stroke="#16a34a" stroke-width="0.6" stroke-linecap="round">
    <line x1="81" y1="78" x2="76" y2="75"/>
    <line x1="72" y1="86" x2="67" y2="83"/>
    <line x1="60" y1="91" x2="57" y2="87"/>
    <line x1="48" y1="92" x2="48" y2="88"/>
    <line x1="36" y1="89" x2="38" y2="85"/>
    <line x1="25" y1="83" x2="27" y2="79"/>
    <line x1="16" y1="74" x2="19" y2="70"/>
    <line x1="10" y1="64" x2="14" y2="60"/>
    <line x1="8"  y1="52" x2="12" y2="49"/>
    <line x1="10" y1="39" x2="14" y2="37"/>
    <line x1="16" y1="28" x2="19" y2="27"/>
  </g>

  <!-- Head (leading end, top-right) -->
  <circle cx="88" cy="68" r="4.5" fill="#4ade80" stroke="#16a34a" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="90" cy="65" r="1.5" fill="white"/>
  <circle cx="91" cy="69" r="1.5" fill="white"/>
  <circle cx="90.5" cy="65" r="0.8" fill="#166534"/>
  <circle cx="91.5" cy="69" r="0.8" fill="#166534"/>

  <!-- Mouth -->
  <circle cx="93" cy="67" r="1.2" fill="none" stroke="#166534" stroke-width="0.6"/>
  <line x1="93" y1="65.8" x2="93" y2="68.2" stroke="#166534" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Antennae -->
  <path d="M 87 63 Q 84 56  82 54" fill="none" stroke="#16a34a" stroke-width="1" stroke-linecap="round"/>
  <path d="M 90 63 Q 94 55  96 54" fill="none" stroke="#16a34a" stroke-width="1" stroke-linecap="round"/>
  <circle cx="82" cy="54" r="1.2" fill="#4ade80"/>
  <circle cx="96" cy="54" r="1.2" fill="#4ade80"/>

  <!-- Tail (trailing end, bottom-right) -->
  <circle cx="60" cy="14" r="3" fill="#86efac" stroke="#16a34a" stroke-width="0.8"/>
  <line x1="60" y1="11" x2="63" y2="7" stroke="#16a34a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="61" y1="11" x2="66" y2="9" stroke="#16a34a" stroke-width="0.6" stroke-linecap="round"/>
</svg>
